<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <link rel="stylesheet" href="../assets/css/accomplished.css">
    <title>Missão Concluída</title>
</head>
<body>
    <div class="container">
        <section class="container__logo">
            <img src="../assets/images/mascote.png" alt="Mascote">
        </section>
        <section class="container__main">
            <div class="container__title">
                <h1>Missão Concluída!</h1>
                <p>Você está no caminho certo.</p>
            </div>
            <div class="container__report">
                <div class="report-main">
                    <i class="fa-solid fa-star report__xp"></i>
                    <div class="report__xp--text">
                        <h2>+20 XP</h2>
                        <p>na trilha Movimento</p>
                    </div>
                </div>
                <div class="report-main">
                    <i class="fa-solid fa-coins report__points"></i>
                    <div class="report__points--text">
                        <h2>+15 Pontos</h2>
                        <p>na sua carteira</p>
                    </div>
                </div>
                <div class="report-main">
                    <i class="fa-solid fa-fire-flame-curved report__streak"></i>
                    <div class="report__streak--text">
                        <h2>8 Dias</h2>
                        <p>Streak atualizado!</p>
                    </div>
                </div>
            </div>
        </section>
        <section class="container__buttons">
            <div class="container__button">
                <a href="../index.html">Voltar para o Início</a>
            </div>
            <div class="container__button">
                <a id="container__button--wallet" href="./wallet.html">Ver minha carteira</a>
            </div>
        </section>
    </div>
    <script src="https://kit.fontawesome.com/926ab92bcf.js" crossorigin="anonymous"></script>
</body>
</html>
