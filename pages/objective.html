<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/objective.css">
    <link href="https://cdn.lineicons.com/5.1/line/lineicons.css" rel="stylesheet"/>
    <title>Objetivos</title>
</head>
<body>
    <section class="container">
        <section class="container__text">
            <div class="container__text--title">
                <h2>O que você quer cuidar primeiro?</h2>
            </div>
            <div class="container__text--paragraph">
                <p>Escolha pelo menos um objetivo para começarmos.</p>
            </div>
        </section>
        <section class="container__cards">
            <div class="container__cards--card">
                <div class="card-text">
                    <i class="fa-regular fa-moon"></i>
                    <h3>Dormir melhor</h3>
                </div>
                <input type="checkbox">
            </div>
            <div class="container__cards--card">
                <div class="card-text">
                    <i class="lni lni-beat"></i>
                    <h3>Mexer mais o corpo</h3>
                </div>
                <input type="checkbox">
            </div>
            <div class="container__cards--card">
                <div class="card-text">
                    <i class="fa-solid fa-brain"></i>
                    <h3>Cuidar da mente</h3>
                </div>
                <input type="checkbox">
            </div>
            <div class="container__cards--card">
                <div class="card-text">
                    <i class="fa-solid fa-utensils"></i>
                    <h3>Me alimentar melhor</h3>
                </div>
                <input type="checkbox">
            </div>
        </section>
        <section class="container__button">
            <a href="./terms.html">Continuar</a>
        </section>
    </section>
    <script src="https://kit.fontawesome.com/926ab92bcf.js" crossorigin="anonymous"></script>
</body>
</html>
